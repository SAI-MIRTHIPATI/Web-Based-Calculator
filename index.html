<!-- Web Based Calculator using HTML,CSS & JavaScript -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Based calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div>
        <h3>Web Calculator</h3>
        <table>
            <tr>
                <textarea id="answerarea">
                </textarea>
            </tr>
            <tr>
                <td><button onclick="myAppend('7')" id="num">7</button></td>
                <td><button onclick="myAppend('8')" id="num">8</button></td>
                <td><button onclick="myAppend('9')" id="num">9</button></td>
                <td><button style="background-color: rgb(12, 232, 210);" onclick="myAppend('**')" id="operator">^</button></td>
                <td><button style="background-color: rgb(12, 232, 210);" onclick="myAppend('%')" id="operator">%</button></td>
            </tr>
            <tr>
                <td><button onclick="myAppend('4')" id="num">4</button></td>
                <td><button onclick="myAppend('5')" id="num">5</button></td>
                <td><button onclick="myAppend('6')" id="num">6</button></td>
                <td><button style="background-color: rgb(171, 133, 133);" onclick="myAppend('*')" id="operator">*</button></td>
                <td><button style="background-color: rgb(171, 133, 133);" onclick="myAppend('/')" id="operator">/</button></td>
            </tr>
            <tr>
                <td><button onclick="myAppend('1')" id="num">1</button></td>
                <td><button onclick="myAppend('2')" id="num">2</button></td>
                <td><button onclick="myAppend('3')" id="num">3</button></td>
                <td><button style="background-color: rgb(193, 224, 124);" onclick="myAppend('-')" id="operator">-</button></td>
                <td rowspan="2"><button style="height: 100px; background-color: aqua;" onclick="calculate()" id="equals">=</button></td>
            </tr>
            <tr>
                <td><button style="background-color: rgb(123, 71, 219);" onclick="clearAnswer()" id="clearmyAppend()">C</button></td>
                <td><button ondblclick="myAppend('0')" id="num">0</button></td>
                <td><button ondblclick="myAppend('.')" id="num">.</button></td>
                <td><button style="background-color: rgb(193, 82, 215);" onclick="myAppend('+')" id="operator">+</button></td>
                
            </tr>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
